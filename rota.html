<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROTA — Criador de Roteiros</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#12110f;--ink2:#56534a;--ink3:#9e9b92;
  --paper:#f8f6f1;--paper2:#efecea;--paper3:#e2ddd6;
  --rota:#e85d26;--rota2:#fdf0eb;--rota3:#f5c4ad;
  --ali:#8b5cf6;--ali2:#ede9fe;
  --green:#16a34a;--amber:#b45309;
  --r:6px;--rm:10px;--rl:16px;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);}
header{border-bottom:1px solid var(--paper3);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;background:var(--paper);position:sticky;top:0;z-index:10;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-icon{width:32px;height:32px;border-radius:8px;background:var(--rota);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:0.02em;}
.brand-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ink);letter-spacing:0.02em;}
.brand-name span{color:var(--rota);}
.brand-sub{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);}
.tag{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);background:var(--paper2);border:1px solid var(--paper3);padding:4px 10px;border-radius:100px;}
.new-btn{padding:9px 20px;background:var(--ink);color:var(--paper);border:none;border-radius:var(--rm);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
.new-btn:hover{opacity:0.82;}

.chat{width:100%;max-width:720px;margin:0 auto;padding:2rem 1.5rem 8rem;display:flex;flex-direction:column;gap:1rem;}

.msg{animation:fadeUp 0.25s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.bot-row{display:flex;align-items:flex-start;gap:10px;}
.bot-av{width:30px;height:30px;border-radius:8px;background:var(--rota);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px;}
.bot-bubble{background:var(--paper2);border:1px solid var(--paper3);border-radius:0 var(--rl) var(--rl) var(--rl);padding:16px 20px;font-size:15px;line-height:1.75;color:var(--ink);flex:1;}
.bot-bubble b{font-weight:500;}
.user-msg{display:flex;justify-content:flex-end;}
.user-bubble{background:var(--ink);color:var(--paper);border-radius:var(--rl) 0 var(--rl) var(--rl);padding:12px 18px;font-size:14.5px;line-height:1.55;max-width:80%;}

.ref-card{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--rl);padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.ref-label{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase;margin-bottom:6px;}
.ref-label span{color:var(--ink3);font-weight:400;}
.ref-card textarea{width:100%;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--paper3);border-radius:var(--rm);background:var(--paper);color:var(--ink);resize:none;line-height:1.55;}
.ref-card textarea:focus{outline:none;border-color:var(--rota3);}
.exemplos-row{display:flex;gap:8px;flex-wrap:wrap;}
.exemplo-chip{padding:6px 14px;border:1px solid var(--paper3);border-radius:100px;font-size:12px;font-family:'DM Mono',monospace;color:var(--ink2);background:var(--paper);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.exemplo-chip:hover{border-color:var(--rota3);color:var(--rota);background:var(--rota2);}
.exemplo-chip.ativo{border-color:var(--rota);color:var(--rota);background:var(--rota2);}

/* input bar */
.input-bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--paper3);padding:16px 24px 20px;}
.input-inner{max-width:720px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;}
.input-inner textarea{flex:1;padding:12px 16px;font-size:14.5px;font-family:'DM Sans',sans-serif;border:1px solid var(--paper3);border-radius:var(--rm);background:var(--paper);color:var(--ink);resize:none;line-height:1.6;min-height:48px;max-height:96px;overflow-y:auto;}
.input-inner textarea:focus{outline:none;border-color:var(--rota3);}
.send-btn{padding:12px 20px;background:var(--rota);color:#fff;border:none;border-radius:var(--rm);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;flex-shrink:0;}
.send-btn:hover{opacity:0.88;}
.send-btn:disabled{opacity:0.4;cursor:default;}

.loading-dots{display:flex;gap:4px;padding:4px 0;}
.loading-dots span{width:7px;height:7px;border-radius:50%;background:var(--ink3);animation:bounce 1.2s infinite;}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

.roteiro-card{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--rl);overflow:hidden;margin-top:8px;}
.roteiro-header{background:var(--rota);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.roteiro-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;}
.roteiro-meta{font-size:12px;color:rgba(255,255,255,0.8);font-family:'DM Mono',monospace;margin-top:3px;}
.roteiro-body{padding:0;}

.estrutura-section{padding:16px 20px;border-bottom:1px solid var(--paper3);}
.sec-label{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.08em;color:var(--ink3);text-transform:uppercase;margin-bottom:10px;}
.estrutura-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--paper3);}
.estrutura-item:last-child{border-bottom:none;}
.est-num{width:24px;height:24px;border-radius:50%;background:var(--rota2);border:1px solid var(--rota3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--rota);flex-shrink:0;margin-top:1px;}
.est-info{}
.est-nome{font-size:14px;font-weight:500;color:var(--ink);}
.est-desc{font-size:13px;color:var(--ink2);line-height:1.55;margin-top:2px;}
.est-dur{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);margin-top:3px;}

.cena-block{border-bottom:1px solid var(--paper3);padding:16px 20px;}
.cena-block:last-child{border-bottom:none;}
.cena-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cena-num{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--rota);background:var(--rota2);padding:3px 10px;border-radius:100px;}
.cena-nome{font-size:14px;font-weight:500;color:var(--ink);}
.cena-dur{font-size:12px;font-family:'DM Mono',monospace;color:var(--ink3);margin-left:auto;}
.cena-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cena-field{background:var(--paper2);border-radius:var(--r);padding:10px 12px;}
.cena-field-label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase;margin-bottom:5px;}
.cena-field-val{font-size:13.5px;color:var(--ink);line-height:1.6;}
.cena-field.full{grid-column:span 2;}
.cena-camera{display:flex;align-items:center;gap:6px;}
.camera-dot{width:8px;height:8px;border-radius:50%;background:var(--rota);flex-shrink:0;}

.roteiro-actions{padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;background:var(--paper2);border-top:1px solid var(--paper3);}
.action-btn{padding:9px 18px;border:1px solid var(--paper3);border-radius:var(--rm);font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink2);background:var(--paper);cursor:pointer;transition:all 0.15s;}
.action-btn:hover{border-color:var(--ink3);color:var(--ink);}
.action-btn.primary{background:var(--ali);color:#fff;border-color:var(--ali);}
.action-btn.primary:hover{opacity:0.88;}

.formato-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:500;font-family:'DM Mono',monospace;background:var(--rota2);color:var(--rota);border:1px solid var(--rota3);margin-top:6px;}

/* Modal de exemplo */
.modal-overlay{position:fixed;inset:0;background:rgba(18,17,15,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--rl);max-width:540px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.12);animation:slideUp 0.25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ink);}
.modal-close{width:28px;height:28px;border:none;background:var(--paper2);border-radius:50%;cursor:pointer;font-size:14px;color:var(--ink3);display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--paper3);}
.modal-body{padding:16px 24px;}
.modal-label{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:0.06em;color:var(--ink3);text-transform:uppercase;margin-bottom:8px;}
.modal-example{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--rm);padding:14px 16px;font-size:14px;line-height:1.7;color:var(--ink);}
.modal-footer{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.modal-use-btn{padding:10px 20px;background:var(--rota);color:#fff;border:none;border-radius:var(--rm);font-size:13.5px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
.modal-use-btn:hover{opacity:0.88;}
.modal-cancel-btn{padding:10px 18px;background:transparent;color:var(--ink2);border:1px solid var(--paper3);border-radius:var(--rm);font-size:13.5px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.modal-cancel-btn:hover{border-color:var(--ink3);}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">R</div>
    <div>
      <div class="brand-name">ROTA <span>/ roteiros</span></div>
      <div class="brand-sub">criador de roteiros audiovisuais</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="tag">grupo sabin · ci</span>
    <button class="new-btn" onclick="novoRoteiro()">Novo roteiro</button>
  </div>
</header>

<div class="chat" id="app"></div>



<div class="input-bar">
  <div class="input-inner">
    <textarea id="userInput" placeholder="Descreva a ideia do vídeo..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="enviar()">Enviar →</button>
  </div>
</div>

<script>


const EXEMPLOS = {
  direto: 'Tom: direto e informativo. Foco em dados, conquistas e fatos concretos. Sem rodeios, sem emoção excessiva. Linguagem objetiva, ritmo rápido, informação na frente.',
  emocional: 'Tom: humano e emocional. Foco na história das pessoas, conexão e sentimento. Abertura com pergunta que toca o espectador, depoimento pessoal, fechamento reflexivo.',
  institucional: 'Tom: institucional e sóbrio. Linguagem clara e profissional, sem informalidade excessiva. Estrutura organizada, visual limpo, mensagem corporativa com credibilidade.'
};

let exemploAtivo = null;

function aplicarExemplo(el, tipo) {
  document.querySelectorAll('.exemplo-chip').forEach(c => c.classList.remove('ativo'));
  if (exemploAtivo === tipo) {
    exemploAtivo = null;
  } else {
    el.classList.add('ativo');
    exemploAtivo = tipo;
  }
}

const FORMATOS={
  hit:{nome:'Hit',dur:'até 90s',desc:'Câmera parada, 1 ou 2 pessoas, edição direta'},
  flow:{nome:'Flow',dur:'até 90s',desc:'Câmera em movimento, efeitos gráficos, trilha'},
  stone:{nome:'Stone',dur:'até 3min',desc:'Múltiplos depoimentos, efeitos, trilha'},
  cruze:{nome:'Cruze',dur:'mais de 3min',desc:'Sem limite de pessoas, alta complexidade'}
};

const SYSTEM_PROMPT=`Você é o ROTA, assistente especializado em criar roteiros para vídeos institucionais e de comunicação interna do Grupo Sabin.

Você foi treinado no estilo de escrita de Gabriel Ryota, head de audiovisual da CI do Sabin. Siga rigorosamente essas diretrizes:

## ESTILO GABRIEL RYOTA / SABIN

**Tom e linguagem:**
- O tom varia conforme a demanda: pode ser próximo e humano, leve e descontraído, motivacional ou institucional — mas NUNCA excessivamente formal ou corporativo.
- Linguagem acessível, sem jargões ou frases de RH genéricas. Fale como gente real fala.
- Evite clichês motivacionais ("juntos somos mais fortes", "o futuro é agora", etc.).

**Estrutura de abertura:**
- Abra sempre com uma pergunta direta para o espectador. Ela deve ser curta, provocativa e real — algo que a pessoa realmente se pergunta no dia a dia.
- Ex: "Você sabe o que mudou no Sabin por causa da sua opinião?"

**Falas e depoimentos:**
- Nunca escreva falas longas. Corte sempre que possível. Cada fala deve caber em uma respiração.
- Quando houver depoimento de pessoa real, escreva o roteiro completo — a pessoa vai decorar ou usar como base. Deixe o texto natural, como a pessoa falaria, não como um script corporativo.
- Prefira frases curtas com pausas naturais.

**Recursos visuais obrigatórios nos roteiros:**
- Texto na tela com conquistas ou dados (sempre que houver números ou resultados).
- Câmera em movimento (walking shot) quando a cena pedir dinâmica.
- Cortes rápidos de ambiente para manter ritmo.
- Depoimento direto para a câmera quando houver pessoas falando.

**Fechamento:**
- Sempre feche com frase de impacto ou reflexão — não com chamada para ação genérica nem com "obrigado por assistir".
- A frase final deve ecoar a pergunta da abertura ou trazer uma virada de perspectiva.

**O que NUNCA fazer:**
- Falas longas sem corte.
- Linguagem muito formal ou corporativa.
- Clichês motivacionais.
- Narração em off como recurso principal sem mostrar rosto.
- Roteiros genéricos que poderiam ser de qualquer empresa.

---

## FORMATOS RYOTA FILMS

- **Hit:** até 90s, câmera parada, 1 ou 2 pessoas, edição direta. Para comunicados objetivos.
- **Flow:** até 90s, câmera em movimento, efeitos gráficos e de escrita, trilha. Para mensagens com ritmo.
- **Stone:** até 3 min, múltiplos depoimentos (1 a 5 pessoas), efeitos, trilha. Para histórias coletivas.
- **Cruze:** mais de 3 min, sem limite de pessoas, alta complexidade visual. Para projetos institucionais densos.

---

## SEU FLUXO DE TRABALHO

1. Quando o usuário jogar uma ideia, faça NO MÁXIMO 2 perguntas curtas — só se realmente necessário. Se já tiver informação suficiente, vá direto para a estrutura.
2. Proponha o formato mais adequado com justificativa breve.
3. Gere a estrutura geral (lista de blocos com descrição e duração estimada).
4. Aguarde aprovação ou ajuste do usuário.
5. Quando aprovado, gere o roteiro detalhado cena a cena.

---

## FORMATOS DE RESPOSTA JSON

Para estrutura geral:
{
  "tipo": "estrutura",
  "titulo": "título sugerido",
  "formato": "hit|flow|stone|cruze",
  "justificativa": "por que esse formato",
  "duracao_total": "ex: 75 segundos",
  "blocos": [
    {
      "numero": 1,
      "nome": "nome do bloco",
      "descricao": "o que acontece nesse bloco",
      "duracao": "ex: 15s"
    }
  ]
}

Para roteiro detalhado:
{
  "tipo": "roteiro",
  "titulo": "título do vídeo",
  "formato": "hit|flow|stone|cruze",
  "duracao_total": "ex: 75 segundos",
  "publico": "descrição do público",
  "tom": "descrição do tom",
  "cenas": [
    {
      "numero": 1,
      "nome": "nome da cena",
      "duracao": "ex: 15s",
      "camera": "ex: câmera parada, plano médio",
      "ambiente": "ex: corredor da sede, luz natural",
      "fala": "texto exato da fala ou narração, ou 'sem fala' se for só visual",
      "obs": "observação de captação ou edição"
    }
  ]
}

Para perguntas ou respostas em texto, responda normalmente em português, sem JSON.
Seja direto, pense sempre em viabilidade de captação real. Roteiros do Sabin têm identidade — não são genéricos.`;

let historico=[];
let roteiroAtual=null;

const app=document.getElementById('app');

function addMsg(html,cls){
  const d=document.createElement('div');
  d.className='msg'+(cls?' '+cls:'');
  d.innerHTML=html;
  app.appendChild(d);
  setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'end'}),60);
  return d;
}
function addBot(h){return addMsg(`<div class="bot-row"><div class="bot-av">R</div><div class="bot-bubble">${h}</div></div>`);}
function addUser(t){return addMsg(`<div class="user-msg"><div class="user-bubble">${t}</div></div>`);}
function addLoading(){
  const d=addMsg(`<div class="bot-row"><div class="bot-av">R</div><div class="bot-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>`);
  d.id='loading';return d;
}
function removeLoading(){const l=document.getElementById('loading');if(l)l.remove();}

function renderEstrutura(data){
  const fmt=FORMATOS[data.formato]||{nome:data.formato,dur:'',desc:''};
  const blocosHtml=data.blocos.map(b=>`
    <div class="estrutura-item">
      <div class="est-num">${b.numero}</div>
      <div class="est-info">
        <div class="est-nome">${b.nome}</div>
        <div class="est-desc">${b.descricao}</div>
        <div class="est-dur">${b.duracao}</div>
      </div>
    </div>`).join('');

  const html=`
<div class="roteiro-card">
  <div class="roteiro-header">
    <div>
      <div class="roteiro-title">${data.titulo}</div>
      <div class="roteiro-meta">${data.duracao_total} · estrutura geral</div>
    </div>
  </div>
  <div class="estrutura-section">
    <div class="sec-label">Formato sugerido</div>
    <div style="font-size:14px;color:var(--ink2);margin-bottom:8px;">${data.justificativa}</div>
    <span class="formato-badge">${fmt.nome} · ${fmt.dur}</span>
  </div>
  <div class="estrutura-section">
    <div class="sec-label">Estrutura — ${data.blocos.length} blocos</div>
    ${blocosHtml}
  </div>
  <div class="roteiro-actions">
    <button class="action-btn primary" onclick="aprovarEstrutura()">Aprovar e detalhar roteiro →</button>
    <button class="action-btn" onclick="pedirAjuste()">Pedir ajuste</button>
  </div>
</div>`;

  addMsg(html);
  roteiroAtual={tipo:'estrutura',data};
}

function renderRoteiro(data){
  const fmt=FORMATOS[data.formato]||{nome:data.formato,dur:'',desc:''};
  const cenasHtml=data.cenas.map(c=>`
    <div class="cena-block">
      <div class="cena-header">
        <span class="cena-num">Cena ${c.numero}</span>
        <span class="cena-nome">${c.nome}</span>
        <span class="cena-dur">${c.duracao}</span>
      </div>
      <div class="cena-grid">
        <div class="cena-field">
          <div class="cena-field-label">Câmera</div>
          <div class="cena-field-val cena-camera"><div class="camera-dot"></div>${c.camera}</div>
        </div>
        <div class="cena-field">
          <div class="cena-field-label">Ambiente</div>
          <div class="cena-field-val">${c.ambiente}</div>
        </div>
        <div class="cena-field full">
          <div class="cena-field-label">Fala / Narração</div>
          <div class="cena-field-val" style="font-style:${c.fala==='sem fala'?'italic':'normal'};color:${c.fala==='sem fala'?'var(--ink3)':'var(--ink)'};">${c.fala}</div>
        </div>
        ${c.obs?`<div class="cena-field full"><div class="cena-field-label">Observação de captação</div><div class="cena-field-val" style="color:var(--ink2);">${c.obs}</div></div>`:''}
      </div>
    </div>`).join('');

  const html=`
<div class="roteiro-card">
  <div class="roteiro-header">
    <div>
      <div class="roteiro-title">${data.titulo}</div>
      <div class="roteiro-meta">${data.duracao_total} · ${data.cenas.length} cenas · ${fmt.nome}</div>
    </div>
  </div>
  <div class="roteiro-body">${cenasHtml}</div>
  <div class="roteiro-actions">
    <button class="action-btn primary" onclick="enviarParaAlicine()">Enviar para ALICINE →</button>
    <button class="action-btn" onclick="pedirAjuste()">Ajustar roteiro</button>
    <button class="action-btn" onclick="copiarRoteiro()">Copiar texto</button>
  </div>
</div>`;

  addMsg(html);
  roteiroAtual={tipo:'roteiro',data};
}

async function chamarAPI(mensagem){
  historico.push({role:'user',content:mensagem});
  const res=await fetch('https://video-status-ci.vercel.app/api/rota',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      system:SYSTEM_PROMPT,
      messages:historico
    })
  });
  if(!res.ok){
    const err=await res.text();
    throw new Error('API error: '+res.status+' '+err);
  }
  const data=await res.json();
  const texto=data.content?.map(c=>c.text||'').join('').trim();
  historico.push({role:'assistant',content:texto});
  return texto;
}

function parseResposta(texto){
  try{
    const match=texto.match(/\{[\s\S]*\}/);
    if(match){
      const json=JSON.parse(match[0]);
      return json;
    }
  }catch(e){}
  return null;
}

async function enviar(){
  const inp=document.getElementById('userInput');
  const ref=document.getElementById('refInput');
  const txt=inp.value.trim();
  if(!txt)return;
  const refTxt=ref?ref.value.trim():'';
  const exemploTxt=exemploAtivo?EXEMPLOS[exemploAtivo]:'';
  let msgCompleta=txt;
  if(refTxt) msgCompleta+=`\n\n[Materiais de referência:\n${refTxt}]`;
  if(exemploTxt) msgCompleta+=`\n\n[Abordagem desejada: ${exemploTxt}]`;

  inp.value='';
  inp.style.height='auto';
  if(ref)ref.value='';
  document.querySelectorAll('.exemplo-chip').forEach(c=>c.classList.remove('ativo'));
  exemploAtivo=null;
  document.getElementById('sendBtn').disabled=true;

  const labelExtra=(refTxt||exemploTxt)?`<br><span style="font-size:12px;opacity:0.6;">+ contexto anexado</span>`:'';
  addUser(txt+labelExtra);
  const loading=addLoading();

  try{
    const resposta=await chamarAPI(msgCompleta);
    removeLoading();
    const json=parseResposta(resposta);
    if(json&&json.tipo==='estrutura'){
      addBot('Aqui está a estrutura que propus para o seu vídeo. Confira os blocos e aprove para eu detalhar cena por cena.');
      renderEstrutura(json);
    } else if(json&&json.tipo==='roteiro'){
      addBot('Roteiro detalhado pronto. Confira cada cena e ajuste o que precisar.');
      renderRoteiro(json);
    } else {
      addBot(resposta.replace(/\n/g,'<br>'));
    }
  }catch(e){
    removeLoading();
    console.error(e);
    addBot('Ocorreu um erro ao conectar com a API. Verifique a chave e tente novamente.');
  }
  document.getElementById('sendBtn').disabled=false;
}

function aprovarEstrutura(){
  addUser('Aprovado. Pode detalhar o roteiro completo.');
  enviarSilencioso('O usuário aprovou a estrutura. Gere agora o roteiro detalhado completo em JSON com todas as cenas.');
}

function pedirAjuste(){
  document.getElementById('userInput').focus();
  document.getElementById('userInput').placeholder='Descreva o ajuste que quer fazer...';
}

async function enviarSilencioso(msg){
  document.getElementById('sendBtn').disabled=true;
  const loading=addLoading();
  try{
    const resposta=await chamarAPI(msg);
    removeLoading();
    const json=parseResposta(resposta);
    if(json&&json.tipo==='roteiro'){
      addBot('Roteiro detalhado pronto. Confira cada cena — e quando estiver bom, envie para a ALICINE.');
      renderRoteiro(json);
    } else if(json&&json.tipo==='estrutura'){
      addBot('Estrutura atualizada.');
      renderEstrutura(json);
    } else {
      addBot(resposta.replace(/\n/g,'<br>'));
    }
  }catch(e){
    removeLoading();
    addBot('Erro ao processar. Tente novamente.');
  }
  document.getElementById('sendBtn').disabled=false;
}

function enviarParaAlicine(){
  if(!roteiroAtual||roteiroAtual.tipo!=='roteiro'){
    addBot('Finalize o roteiro antes de enviar para a ALICINE.');
    return;
  }
  const d=roteiroAtual.data;
  const fmt=d.formato||'nd';
  const params=new URLSearchParams({
    roteiro:'1',
    titulo:d.titulo||'',
    formato:fmt,
    duracao:d.duracao_total||'',
    publico:d.publico||'',
    tom:d.tom||'',
    cenas:d.cenas.length
  });
  window.open('alicine_briefing.html?'+params.toString(),'_blank');
  addBot('Abrindo a ALICINE com as informações do roteiro pré-preenchidas. Complete os campos restantes e envie o briefing.');
}

function copiarRoteiro(){
  if(!roteiroAtual||roteiroAtual.tipo!=='roteiro')return;
  const d=roteiroAtual.data;
  let txt=`ROTEIRO: ${d.titulo}\nFormato: ${d.formato.toUpperCase()} · ${d.duracao_total}\n\n`;
  d.cenas.forEach(c=>{
    txt+=`CENA ${c.numero} — ${c.nome} (${c.duracao})\n`;
    txt+=`Câmera: ${c.camera}\n`;
    txt+=`Ambiente: ${c.ambiente}\n`;
    txt+=`Fala: ${c.fala}\n`;
    if(c.obs)txt+=`Obs: ${c.obs}\n`;
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>{
    addBot('Roteiro copiado para a área de transferência.');
  }).catch(()=>{
    addBot('Não foi possível copiar automaticamente. Selecione o texto manualmente.');
  });
}

function novoRoteiro(){
  if(historico.length>0&&!confirm('Iniciar um novo roteiro? O atual será perdido.'))return;
  historico=[];
  roteiroAtual=null;
  app.innerHTML='';
  init();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,160)+'px';
}


const EXEMPLOS_MODAL = {
  direto: {
    titulo: '⚡ Direto e informativo',
    exemplo: 'Olá! Preciso de um vídeo para comunicar os resultados da nossa Pesquisa de Clima 2025 para todos os colaboradores do Sabin. O objetivo é mostrar os principais números alcançados e o que a empresa fez com base nas respostas. Tom direto, linguagem curta, sem voltas. Quem está solicitando: Rebeca, Talentos Humanos. Duração aproximada: 1 minuto e 30 segundos.',
    template: `Preciso de um vídeo comunicando [COLOQUE O TEMA AQUI] para [COLOQUE O PÚBLICO AQUI]. O objetivo é informar sobre [COLOQUE O RESULTADO/DADO AQUI]. Tom direto, linguagem curta, sem voltas e sem rodeios. Duração aproximada: [COLOQUE A DURAÇÃO AQUI].`
  },
  emocional: {
    titulo: '❤️ Humano e emocional',
    exemplo: 'Oi! Quero um vídeo que conte a história de colaboradoras que passaram por tratamento de saúde mental e como o suporte do Sabin fez diferença na vida delas. O público são todos os colaboradores. Tom próximo, íntimo, com uma abordagem sensível do assunto e evocação de emoção real. Quem está solicitando: Rebeca, Talentos Humanos.',
    template: `Quero um vídeo que conte a história de [COLOQUE A PESSOA OU GRUPO AQUI] e como [COLOQUE O IMPACTO OU CONQUISTA AQUI] mudou algo para eles. O público é [COLOQUE O PÚBLICO AQUI]. Tom próximo, íntimo, com uma abordagem sensível do assunto e evocação de emoção real.`
  },
  institucional: {
    titulo: '🏛️ Institucional e sóbrio',
    exemplo: 'Bom dia! Precisamos de um vídeo institucional sobre a nova política de benefícios do Sabin para comunicar as mudanças que entram em vigor em julho para todos os colaboradores CLT. Tom formal, linguagem clara, direta e profissional. Quem está solicitando: Rebeca, Talentos Humanos.',
    template: `Precisamos de um vídeo com tom institucional sobre [COLOQUE O TEMA AQUI] para comunicar [COLOQUE A MENSAGEM PRINCIPAL AQUI] ao público [COLOQUE O PÚBLICO AQUI]. Tom formal, linguagem clara, direta e profissional.`
  }
};

let tipoModalAtivo = null;

function abrirModal(tipo) {
  const dados = EXEMPLOS_MODAL[tipo];
  if (!dados) return;
  tipoModalAtivo = tipo;
  document.getElementById('modalTitulo').textContent = dados.titulo;
  document.getElementById('modalTexto').textContent = dados.exemplo;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function fecharModalBtn() {
  document.getElementById('modalOverlay').style.display = 'none';
  tipoModalAtivo = null;
}

function fecharModal(e) {
  if (e.target === document.getElementById('modalOverlay')) fecharModalBtn();
}

function usarTemplate() {
  if (!tipoModalAtivo) return;
  const template = EXEMPLOS_MODAL[tipoModalAtivo].template;
  const inp = document.getElementById('userInput');
  inp.value = template;
  autoResize(inp);
  inp.focus();
  fecharModalBtn();
}

function init(){
  addBot('Olá! Sou o <b>ROTA</b>, criador de roteiros da CI.<br><br>Me conta a ideia do vídeo — tema, objetivo e para quem é. Com isso já consigo propor um formato e estrutura. Depois a gente detalha cena por cena.<br><br>Pode jogar a ideia como vier — sem formalidade.');
  addMsg(`<div class="ref-card">
    <div>
      <div class="ref-label">Referências <span>(opcional)</span></div>
      <textarea id="refInput" placeholder="Cole links e descreva brevemente — ex: https://youtube.com/... — esse é o tom que quero" rows="2"></textarea>
    </div>
    <div>
      <div class="ref-label">Abordagem <span>(opcional)</span></div>
      <div class="exemplos-row">
        <div class="exemplo-chip" onclick="aplicarExemplo(this,'direto');abrirModal('direto')">⚡ Direto e informativo</div>
        <div class="exemplo-chip" onclick="aplicarExemplo(this,'emocional');abrirModal('emocional')">❤️ Humano e emocional</div>
        <div class="exemplo-chip" onclick="aplicarExemplo(this,'institucional');abrirModal('institucional')">🏛️ Institucional e sóbrio</div>
      </div>
    </div>
  </div>`);
  document.getElementById('userInput').focus();
}

init();
</script>

<div id="modalOverlay" style="display:none;" class="modal-overlay" onclick="fecharModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitulo"></div>
      <button class="modal-close" onclick="fecharModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-label">Exemplo de solicitação</div>
      <div class="modal-example" id="modalTexto"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" onclick="fecharModalBtn()">Fechar</button>
      <button class="modal-use-btn" onclick="usarTemplate()">Usar este exemplo →</button>
    </div>
  </div>
</div>
